name: 🚀 Deploy to Live Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, pdo, pdo_mysql, zip, exif, pcntl, bcmath, gd, intl
          coverage: none

      - name: 📁 Prepare Laravel directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/views
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/cache/data
          mkdir -p storage/logs

      - name: 📦 Install Composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: 🗑️ Clean files not meant for production
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf .claude
          rm -f .env
          rm -f .env.example
          rm -f .gitignore
          rm -rf node_modules
          rm -rf storage/logs/*.log
          rm -rf storage/framework/cache/data/*
          rm -rf storage/framework/sessions/*
          rm -rf storage/framework/views/*
          rm -rf storage/framework/testing/*
          rm -rf tests
          rm -f phpunit.xml
          rm -f security-audit-report.md
          rm -f PRE_LAUNCH_AUDIT_REPORT.md
          rm -f temp_check_*.php

      - name: 🧹 Generate one-time cache-clear hook
        id: hook
        run: |
          TOKEN=$(echo "${{ github.sha }}${{ github.run_id }}" | sha256sum | cut -c1-40)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          cat > public/deploy-hook.php << 'PHPEOF'
          <?php
          if (!hash_equals('__DEPLOY_TOKEN__', (string) ($_GET['t'] ?? ''))) {
              http_response_code(404); exit;
          }
          define('LARAVEL_START', microtime(true));
          require __DIR__.'/../vendor/autoload.php';
          $app = require_once __DIR__.'/../bootstrap/app.php';
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          Artisan::call('config:clear');
          Artisan::call('route:clear');
          Artisan::call('view:clear');
          @unlink(__FILE__);
          echo 'OK';
          PHPEOF
          sed -i "s/__DEPLOY_TOKEN__/$TOKEN/" public/deploy-hook.php

      - name: 🚀 Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          protocol: ftps
          port: 21
          timeout: 60000
          log-level: standard
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**
            **/storage/logs/*.log
            **/storage/framework/cache/data/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/testing/*
            **/tests/**
            **/uploads/**
            **/public/storage/**
            **/.claude/**

      - name: 🔄 Clear server cache via deploy hook
        run: |
          sleep 15
          curl -sf "https://1dollardigitizing.com/deploy-hook.php?t=${{ steps.hook.outputs.token }}" \
            && echo "✅ Server cache cleared" \
            || echo "⚠️  Cache hook did not respond — run: php artisan config:clear"
