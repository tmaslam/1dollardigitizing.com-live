name: 🚀 Deploy to Live FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧹 Generate one-time cache-clear hook
        id: hook
        run: |
          TOKEN=$(echo "${{ github.sha }}${{ github.run_id }}" | sha256sum | cut -c1-40)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          cat > deploy-hook.php << 'PHPEOF'
<?php
if (!hash_equals('__DEPLOY_TOKEN__', (string) ($_GET['t'] ?? ''))) {
    http_response_code(404); exit;
}
define('LARAVEL_START', microtime(true));
require __DIR__.'/vendor/autoload.php';
$app = require_once __DIR__.'/bootstrap/app.php';
$app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
Artisan::call('config:clear');
Artisan::call('route:clear');
Artisan::call('view:clear');
@unlink(__FILE__);
echo 'OK';
PHPEOF
          sed -i "s/__DEPLOY_TOKEN__/$TOKEN/" deploy-hook.php

      - name: 📤 Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.REMOTE_PATH }}
          protocol: ftps
          security: loose
          exclude: |
            .env
            .env.*
            uploads/**
            vendor/**
            storage/**
            .ftpquota
            .ftp-deploy-sync-state.json

      - name: 🔄 Clear server cache via deploy hook
        run: |
          sleep 15
          curl -sf "https://legacy.1dollardigitizing.com/deploy-hook.php?t=${{ steps.hook.outputs.token }}" \
            && echo "✅ Server cache cleared" \
            || echo "⚠️  Cache hook did not respond — run: php artisan view:clear"
